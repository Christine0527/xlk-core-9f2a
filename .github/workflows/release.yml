name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Mac 版本（直接上傳到 release，不經過 artifact）────
  build-mac:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies + PyInstaller
        run: pip install -r python/requirements.txt pyinstaller

      - name: Bundle Python executables (PyInstaller)
        run: |
          cd python
          pyinstaller --onedir --name server \
            --hidden-import flask \
            --hidden-import flask_sock \
            --hidden-import pymobiledevice3 \
            --hidden-import pymobiledevice3.usbmux \
            --hidden-import pymobiledevice3.lockdown \
            --hidden-import pymobiledevice3.services.simulate_location \
            --hidden-import pymobiledevice3.services.mobile_image_mounter \
            --hidden-import pymobiledevice3.remote.tunnel_service \
            --hidden-import pymobiledevice3.remote.remote_service_discovery \
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider \
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation \
            --collect-all apple_compress \
            --collect-all pymobiledevice3 \
            --copy-metadata apple_compress \
            --copy-metadata pymobiledevice3 \
            --exclude-module tkinter \
            --exclude-module _tkinter \
            server.py
          pyinstaller --onedir --name root_bridge \
            --hidden-import pymobiledevice3 \
            --hidden-import pymobiledevice3.usbmux \
            --hidden-import pymobiledevice3.lockdown \
            --hidden-import pymobiledevice3.services.simulate_location \
            --hidden-import pymobiledevice3.remote.tunnel_service \
            --hidden-import pymobiledevice3.remote.remote_service_discovery \
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider \
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation \
            --collect-all pymobiledevice3 \
            --copy-metadata pymobiledevice3 \
            --exclude-module tkinter \
            --exclude-module _tkinter \
            root_bridge.py
          mkdir -p ../python-dist/mac
          cp -r dist/server ../python-dist/mac/
          cp -r dist/root_bridge ../python-dist/mac/

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version

      - name: Install Node dependencies
        run: npm ci

      # ── 正式版 ──
      - name: Build Vite (正式版)
        run: IS_TRIAL=false npx vite build

      - name: Build Mac arm64 (正式版)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64 --publish never

      - name: Build Mac x64 (正式版)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Save 正式版 DMGs（避免被試用版覆蓋）
        run: |
          mv release/iOS-Location-Master-arm64.dmg release/iOS-Location-Master-arm64-SAVE.dmg
          mv release/iOS-Location-Master-x64.dmg release/iOS-Location-Master-x64-SAVE.dmg

      # ── 試用版 ──
      - name: Build Vite (試用版)
        run: IS_TRIAL=true npx vite build

      - name: Build Mac arm64 (試用版)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64 --publish never

      - name: Rename Trial arm64 DMG
        run: mv release/iOS-Location-Master-arm64.dmg release/iOS-Location-Master-Trial-arm64.dmg

      - name: Build Mac x64 (試用版)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Rename Trial x64 DMG
        run: mv release/iOS-Location-Master-x64.dmg release/iOS-Location-Master-Trial-x64.dmg

      - name: Restore 正式版 DMGs
        run: |
          mv release/iOS-Location-Master-arm64-SAVE.dmg release/iOS-Location-Master-arm64.dmg
          mv release/iOS-Location-Master-x64-SAVE.dmg release/iOS-Location-Master-x64.dmg

      - name: Publish Mac DMGs directly to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: release/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows 版本（直接上傳到 release，不經過 artifact）─
  build-win:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies + PyInstaller
        run: pip install -r python/requirements.txt pyinstaller

      - name: Bundle Python executables (PyInstaller)
        run: |
          cd python
          pyinstaller --onefile --name server `
            --hidden-import flask `
            --hidden-import flask_sock `
            --hidden-import pymobiledevice3 `
            --hidden-import pymobiledevice3.usbmux `
            --hidden-import pymobiledevice3.lockdown `
            --hidden-import pymobiledevice3.services.simulate_location `
            --hidden-import pymobiledevice3.services.mobile_image_mounter `
            --hidden-import pymobiledevice3.remote.tunnel_service `
            --hidden-import pymobiledevice3.remote.remote_service_discovery `
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider `
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation `
            --collect-all pymobiledevice3 `
            --copy-metadata pymobiledevice3 `
            server.py
          pyinstaller --onefile --name root_bridge `
            --hidden-import pymobiledevice3 `
            --hidden-import pymobiledevice3.usbmux `
            --hidden-import pymobiledevice3.lockdown `
            --hidden-import pymobiledevice3.services.simulate_location `
            --hidden-import pymobiledevice3.remote.tunnel_service `
            --hidden-import pymobiledevice3.remote.remote_service_discovery `
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider `
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation `
            --collect-all pymobiledevice3 `
            --copy-metadata pymobiledevice3 `
            root_bridge.py
          mkdir -p ../python-dist/win
          copy dist\server.exe ..\python-dist\win\
          copy dist\root_bridge.exe ..\python-dist\win\
        shell: powershell

      - name: Sync version from tag
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v', ''
          npm version $VERSION --no-git-tag-version
        shell: powershell

      - name: Install Node dependencies
        run: npm ci

      # ── 正式版 ──
      - name: Build Windows (正式版)
        run: npx vite build && npx electron-builder --win --publish never
        env:
          IS_TRIAL: 'false'

      - name: Save 正式版 EXE（避免被試用版覆蓋）
        run: Rename-Item release\iOS-Location-Master-Setup.exe iOS-Location-Master-Setup-SAVE.exe
        shell: powershell

      # ── 試用版 ──
      - name: Build Windows (試用版)
        run: npx vite build && npx electron-builder --win --publish never
        env:
          IS_TRIAL: 'true'

      - name: Rename Trial EXE
        run: Rename-Item release\iOS-Location-Master-Setup.exe iOS-Location-Master-Trial-Setup.exe
        shell: powershell

      - name: Restore 正式版 EXE
        run: Rename-Item release\iOS-Location-Master-Setup-SAVE.exe iOS-Location-Master-Setup.exe
        shell: powershell

      - name: Publish Windows EXEs directly to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: release/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
