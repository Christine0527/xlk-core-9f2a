name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Mac 版本（.dmg）────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies + PyInstaller
        run: pip install -r python/requirements.txt pyinstaller

      - name: Bundle Python executables (PyInstaller)
        run: |
          cd python
          pyinstaller --onefile --name server \
            --hidden-import flask \
            --hidden-import flask_sock \
            --hidden-import pymobiledevice3 \
            --hidden-import pymobiledevice3.usbmux \
            --hidden-import pymobiledevice3.lockdown \
            --hidden-import pymobiledevice3.services.simulate_location \
            --hidden-import pymobiledevice3.services.mobile_image_mounter \
            --hidden-import pymobiledevice3.remote.tunnel_service \
            --hidden-import pymobiledevice3.remote.remote_service_discovery \
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider \
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation \
            --collect-all apple_compress \
            --collect-all pymobiledevice3 \
            --copy-metadata apple_compress \
            --copy-metadata pymobiledevice3 \
            server.py
          pyinstaller --onefile --name root_bridge \
            --hidden-import pymobiledevice3 \
            --hidden-import pymobiledevice3.remote.tunnel_service \
            --hidden-import pymobiledevice3.remote.remote_service_discovery \
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider \
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation \
            --collect-all apple_compress \
            --collect-all pymobiledevice3 \
            --copy-metadata apple_compress \
            --copy-metadata pymobiledevice3 \
            root_bridge.py
          mkdir -p ../python-dist/mac
          cp dist/server ../python-dist/mac/
          cp dist/root_bridge ../python-dist/mac/

      - name: Install Node dependencies
        run: npm ci

      - name: Build Vite
        run: npx vite build

      - name: Build Mac app (arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64 --publish never

      - name: Build Mac app (x64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/*.dmg

  # ─── Windows 版本（.exe 安裝包）─────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies + PyInstaller
        run: pip install -r python/requirements.txt pyinstaller

      - name: Bundle Python executables (PyInstaller)
        run: |
          cd python
          pyinstaller --onefile --name server `
            --hidden-import flask `
            --hidden-import flask_sock `
            --hidden-import pymobiledevice3 `
            --hidden-import pymobiledevice3.usbmux `
            --hidden-import pymobiledevice3.lockdown `
            --hidden-import pymobiledevice3.services.simulate_location `
            --hidden-import pymobiledevice3.services.mobile_image_mounter `
            --hidden-import pymobiledevice3.remote.tunnel_service `
            --hidden-import pymobiledevice3.remote.remote_service_discovery `
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider `
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation `
            --collect-all pymobiledevice3 `
            --copy-metadata pymobiledevice3 `
            server.py
          pyinstaller --onefile --name root_bridge `
            --hidden-import pymobiledevice3 `
            --hidden-import pymobiledevice3.remote.tunnel_service `
            --hidden-import pymobiledevice3.remote.remote_service_discovery `
            --hidden-import pymobiledevice3.services.dvt.instruments.dvt_provider `
            --hidden-import pymobiledevice3.services.dvt.instruments.location_simulation `
            --collect-all pymobiledevice3 `
            --copy-metadata pymobiledevice3 `
            root_bridge.py
          mkdir -p ../python-dist/win
          copy dist\server.exe ..\python-dist\win\
          copy dist\root_bridge.exe ..\python-dist\win\
        shell: powershell

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows app
        run: npx vite build && npx electron-builder --win --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe

  # ─── 發佈到 public repo（changemaps-releases）─────────
  create-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: artifacts/mac

      - name: Download Win artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: artifacts/win

      - name: Create Release on public repo
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          repository: Christine0527/changemaps-releases
          token: ${{ secrets.RELEASE_TOKEN }}
